name: Build Android APK

on:
  push:
    branches: [ main, master ]

# 🛑 THIS SILENCES THE ANNOYING YELLOW NODE.JS WARNING
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Get Your Code from the Vault
        uses: actions/checkout@v4

      # 🚀 THE BULLETPROOF BUILDOZER ACTION (No more Broken Pipes!)
      - name: 🛠️ Build the App 
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: master

      - name: 📦 Save the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Retro-Fraction-Solver
          # This automatically grabs the exact APK file the action creates!
          path: ${{ steps.buildozer.outputs.filename }}
