name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    # 🚀 THE FIX: Back to the modern, working servers!
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Get Your Code from the Vault
        uses: actions/checkout@v4

      - name: 🐍 Set up a Perfect Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ Install the Raw Factory Tools
        run: |
          sudo apt-get update || true
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          
          # 🔧 THE FIX: Upgrade 'pip' FIRST so it never loses Cython again!
          python -m pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33 buildozer virtualenv

      - name: 🚀 Build the App
        run: |
          sed -i 's/.*android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
          buildozer -v android debug

      - name: 📦 Save the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Fraction-Solver-App
          path: bin/*.apk
