name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Get Your Code from the Vault
        uses: actions/checkout@v4

      - name: ☕ Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: 🛠️ Install the Raw Factory Tools
        run: |
          sudo apt-get update || true
          
          # 1. Install all system-level dependencies
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev cython3
          
          # 2. THE FIX: Force everything into the System Python toolbox so Buildozer can't miss it
          pip3 install --user --upgrade pip setuptools wheel
          pip3 install --user cython==0.29.33 buildozer virtualenv pep517 sh colorama
          
          # 3. THE FIX: Hardcode the path so the environment is physically linked to the next step
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 🚀 Build the App
        run: |
          sed -i 's/.*android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/.*p4a.branch.*/p4a.branch = master/' buildozer.spec
          
          buildozer -v android debug

      - name: 📦 Save the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Fraction-Solver-App
          path: bin/*.apk
