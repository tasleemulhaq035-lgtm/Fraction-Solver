name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Get Your Code from the Vault
        uses: actions/checkout@v4

      - name: 🐍 Set up a Perfect Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🛠️ Install the Raw Factory Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          
          # THE FIX: Unpinned Cython! Let it get the absolute latest version!
          pip install --upgrade buildozer cython virtualenv

      - name: 🚀 Build the App (The True Final Run)
        # THE FIX: A safe while-loop that answers "yes" without breaking the pipe!
        run: |
          (while true; do echo "y"; sleep 0.5; done) | buildozer -v android debug

      - name: 📦 Save the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Fraction-Solver-App
          path: bin/*.apk
