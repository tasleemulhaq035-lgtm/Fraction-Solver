name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Get Your Code from the Vault
        uses: actions/checkout@v4

      - name: ✅ Automatically Sign Licenses
        run: sed -i 's/.*android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec

      - name: 🚀 Build the App (Official Kivy Engine)
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: master

      - name: 📦 Save the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Fraction-Solver-App
          path: bin/*.apk
