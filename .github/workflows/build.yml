name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Get Your Code from the Vault
        uses: actions/checkout@v4

      - name: ☕ Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: 🛠️ Install the Raw Factory Tools
        run: |
          sudo apt-get update || true
          
          # THE FIX: We added 'python3-pep517' and 'python3-venv' directly to the Linux OS.
          # Buildozer literally cannot ignore these tools now!
          sudo apt-get install -y git zip unzip python3-pip python3-venv python3-pep517 autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev cython3
          
          pip3 install --user --upgrade pip setuptools wheel
          pip3 install --user cython==0.29.33 buildozer virtualenv
          
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: 🚀 Build the App
        run: |
          # Reinforce the path right before building
          export PATH=$HOME/.local/bin:$PATH
          
          sed -i 's/.*android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/.*p4a.branch.*/p4a.branch = master/' buildozer.spec
          
          buildozer -v android debug

      - name: 📦 Save the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Fraction-Solver-App
          path: bin/*.apk
