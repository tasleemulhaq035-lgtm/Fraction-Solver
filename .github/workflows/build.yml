name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Get Your Code from the Vault
        uses: actions/checkout@v4

      - name: 🐍 Set up a Perfect Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ Install the Raw Factory Tools
        run: |
          sudo apt-get update || true
          # Added cython3 to the raw system install so Linux has it too!
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev cython3
          
          python -m pip install --upgrade pip setuptools wheel
          
          # 🔨 THE FIX: Brute-force Cython into every possible Python channel!
          python -m pip install cython==0.29.33 buildozer virtualenv
          python3 -m pip install cython==0.29.33
          pip install cython==0.29.33

      - name: 🚀 Build the App
        run: |
          # 🔨 THE FIX: Force the computer to look in the exact folder where Cython lives!
          export PATH=$PATH:~/.local/bin
          sed -i 's/.*android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
          buildozer -v android debug

      - name: 📦 Save the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Fraction-Solver-App
          path: bin/*.apk
