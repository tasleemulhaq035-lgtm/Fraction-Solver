name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Get Your Code from the Vault
        uses: actions/checkout@v4

      - name: 🐍 Set up a Perfect Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ☕ Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: 🛠️ Install the Raw Factory Tools
        run: |
          sudo apt-get update || true
          sudo apt-get install -y git zip unzip python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev cython3
          
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install cython==0.29.33 buildozer virtualenv

      - name: 🚀 Build the App
        run: |
          export PATH=$PATH:~/.local/bin
          
          # Accept the Android licenses
          sed -i 's/.*android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
          
          # 🔨 THE FIX: Force Buildozer to use the newest 'master' engine to bypass the copy bug!
          sed -i 's/.*p4a.branch.*/p4a.branch = master/' buildozer.spec
          
          buildozer -v android debug

      - name: 📦 Save the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Fraction-Solver-App
          path: bin/*.apk
