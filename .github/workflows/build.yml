name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 📥 Get Your Code from the Vault
        uses: actions/checkout@v4

      - name: ☕ Set up Java 17 (The Magic Fix)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🛠️ Install the Android Factory Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libltdl-dev libffi-dev libssl-dev python3-dev zip unzip autoconf libtool automake
          pip install --upgrade buildozer cython==0.29.33

      - name: 🚀 Build the App
        run: |
          set +o pipefail
          yes | buildozer -v android debug

      - name: 📦 Save the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Retro-Fraction-Solver
          path: bin/*.apk
