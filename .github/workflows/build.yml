name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Get Your Code from the Vault
        uses: actions/checkout@v4

      # 🔨 THE FIX: Upgraded to Java 17 to match the new engine
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install the Raw Factory Tools
        run: |
          sudo apt-get update || true
          sudo apt-get install -y git zip unzip python3-pip python3-venv python3-pep517 autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev
          sudo pip3 install Cython==0.29.37 buildozer virtualenv pep517

      - name: Build the App
        run: |
          sed -i 's/.*p4a.branch.*/p4a.branch = develop/' buildozer.spec
          buildozer -v android debug

      - name: Save the APK for Download
        uses: actions/upload-artifact@v4
        with:
          name: Fraction-Solver-App
          path: bin/*.apk
